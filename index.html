<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 및 다양한 기기의 화면 크기에 맞게 조절되도록 뷰포트 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brick Breaker</title>
    
    <!-- 외부 스타일시트 파일(style.css)을 로드하여 스타일을 입힙니다 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 화면 전체를 꽉 채우는 중앙 정렬 래퍼 -->
    <div class="viewport-wrapper">
        <!-- 
          [레이아웃 영역 구성]
          - container: JS에서 transform:scale()로 화면 크기에 맞게 스케일 조절
        -->
        <div class="container" id="gameContainer">
            <!-- 게임 제목 영역 -->
            <h1>Brick Breaker Project</h1>
            
            <!-- 캔버스와 오버레이 박스들을 묶는 기준 공간 -->
            <div class="game-area">
                <canvas id="gameCanvas" width="800" height="600"></canvas>

                <!-- 1) 초기 메인 메뉴 오버레이 (시작 전 화면 - 시작하기와 설정 버튼만 포함) -->
                <div id="mainMenuOverlay" class="menu-overlay">
                    <div class="menu-title">BRICK BREAKER by SJW</div>
                    <div class="menu-buttons">
                        <button id="btnStart" class="rect-btn">시작하기</button>
                        <button id="btnSettings" class="rect-btn">설정</button>
                    </div>
                </div>

                <!-- 2) 게임 일시 정지(PAUSE) 시 나타나는 버튼 오버레이 -->
                <div id="pauseMenuOverlay" class="pause-overlay">
                    <button id="btnContinue" class="rect-btn">계속하기</button>
                    <button id="btnBackToMenu" class="rect-btn">메인 메뉴</button>
                </div>

                <!-- 3) 게임 종료(WIN/OVER) 후 나타나는 버튼 오버레이 -->
                <div id="gameEndOverlay" class="game-end-overlay" style="display:none;">
                    <button id="btnRestart" class="rect-btn">재시작</button>
                    <button id="btnEndToMenu" class="rect-btn">메인 메뉴</button>
                </div>

                <!-- 4) 설정 화면 내 메인 메뉴 버튼 오버레이 -->
                <div id="settingsMenuOverlay" class="settings-menu-overlay" style="display:none;">
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
                    <button id="btnSettingsToMenu" class="rect-btn">메인 메뉴</button>
                </div>
            </div>
            
            <!-- 하단 조작 버튼 영역 (개발자용 스테이지 건너뛰기 버튼만 유지) -->
            <div class="bottom-area">
                <!-- 개발자용 스테이지 건너뛰기 버튼 -->
                <button id="cheatBtn" title="테스트용으로 바로 다음 스테이지로 이동합니다">스테이지 건너뛰기 ⏩</button>
            </div>

            <!-- 하단의 설명 안내 문구 -->
            <p class="instructions">Classic Brick Breaker Game - HTML5 Canvas</p>
        </div>
    </div>

    <!-- 외부 자바스크립트 파일 로드 -->
    <script defer src="script.js"></script>
</body>
</html>
